<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Análisis de Selección IT</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter', 'sans-serif'] }
    }
  }
}
</script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', sans-serif; }
  .skill-bar { height: 6px; border-radius: 9999px; }
  button { cursor: pointer; }
</style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

<div id="app" class="p-4 md:p-8"></div>

<script>
const salaryBenchmarks = {
  "Data Science":        { min: 100000, max: 120000, color: "bg-purple-100 text-purple-700" },
  "QA / Testing":        { min: 85000,  max: 100000, color: "bg-orange-100 text-orange-700" },
  "Data Engineering":    { min: 140000, max: 200000, color: "bg-blue-100 text-blue-700" },
  "Data Analysis / BI":  { min: 70000,  max: 200000, color: "bg-emerald-100 text-emerald-700" },
  "Arquitectura TI":     { min: 65000,  max: 140000, color: "bg-red-100 text-red-700" },
  "Project Management":  { min: 100000, max: 300000, color: "bg-indigo-100 text-indigo-700" },
  "Seguridad TI":        { min: 120000, max: 140000, color: "bg-slate-100 text-slate-700" }
};

const candidates = [
  { id:1,  name:"Felipe Sanchez Jimenez",       role:"Data Science",       exp:2,  edu:"Maestria en Miami",                                           english:"Excelente", status:"Activo",     bankExp:"Sí", skills:{python:3,sql:2,bi:3,excel:2,r:2}, benchmark:"Data Science" },
  { id:2,  name:"Lancelote Santos Rodriguez",    role:"QA / Testing",       exp:6,  edu:"Diplomado Ciencia de Datos - Nivel Intermedio",               english:"Regular",   status:"Disponible", bankExp:"Sí", skills:{python:3,sql:4,bi:2,excel:3,r:2}, benchmark:"QA / Testing" },
  { id:3,  name:"Daniel Andres Cabrera Lopez",   role:"Data Engineering",   exp:8,  edu:"Maestría en Inteligencia Artificial",                         english:"Bien",      status:"Activo",     bankExp:"No", skills:{python:4,sql:5,bi:5,excel:5,r:4}, benchmark:"Data Engineering" },
  { id:4,  name:"Yelsin Joel Terrero Amparo",    role:"Data Analysis / BI", exp:5,  edu:"Mestria en Ciencia de Datos",                                 english:"Regular",   status:"Activo",     bankExp:"Sí", skills:{python:2,sql:5,bi:5,excel:5,r:2}, benchmark:"Data Analysis / BI" },
  { id:5,  name:"Ran Shemer Ramirez",            role:"Arquitectura TI",    exp:12, edu:"Ingeniero de Sistemas",                                       english:"Excelente", status:"Disponible", bankExp:"Sí", skills:{python:2,sql:3,bi:3,excel:4,r:2}, benchmark:"Arquitectura TI" },
  { id:6,  name:"Yanilka E. Garcia Amparo",      role:"Project Management", exp:29, edu:"Maestría en Gerencia y Productividad",                        english:"Bien",      status:"Disponible", bankExp:"Sí", skills:{python:2,sql:4,bi:2,excel:4,r:2}, benchmark:"Project Management" },
  { id:7,  name:"Jose Maria Valera Rodriguez",   role:"Data Engineering",   exp:5,  edu:"Maestría en ciberseguridad",                                  english:"Bien",      status:"Activo",     bankExp:"Sí", skills:{python:2,sql:5,bi:3,excel:3,r:2}, benchmark:"Data Engineering" },
  { id:8,  name:"Wilfredo Mateo Acosta",         role:"Project Management", exp:12, edu:"Máster Ciberseguridad + Certificate Digital Project",         english:"Bien",      status:"Activo",     bankExp:"No", skills:{python:3,sql:3,bi:4,excel:4,r:4}, benchmark:"Project Management" },
  { id:9,  name:"Zunilda Guillén Rueda",         role:"Arquitectura TI",    exp:15, edu:"Maestria",                                                    english:"Regular",   status:"Activo",     bankExp:"Sí", skills:{python:2,sql:3,bi:3,excel:4,r:2}, benchmark:"Arquitectura TI" },
  { id:10, name:"Orlando Rodriguez Ramirez",     role:"Project Management", exp:10, edu:"Maestria",                                                    english:"Excelente", status:"Activo",     bankExp:"Sí", skills:{python:1,sql:3,bi:3,excel:5,r:1}, benchmark:"Project Management" },
  { id:11, name:"Fausto Joel Arvelo Diaz",       role:"Project Management", exp:7,  edu:"Grado",                                                       english:"Regular",   status:"Activo",     bankExp:"Sí", skills:{python:1,sql:2,bi:3,excel:4,r:1}, benchmark:"Project Management" },
  { id:12, name:"Raudy Ramon García Rodriguez",  role:"Data Analysis / BI", exp:4,  edu:"Grado",                                                       english:"Excelente", status:"Activo",     bankExp:"Sí", skills:{python:3,sql:4,bi:4,excel:5,r:2}, benchmark:"Data Analysis / BI" },
  { id:13, name:"Ileana Mercedes Guzman",        role:"Project Management", exp:6,  edu:"Maestria",                                                    english:"Excelente", status:"Disponible", bankExp:"No", skills:{python:1,sql:2,bi:3,excel:4,r:1}, benchmark:"Project Management" },
  { id:14, name:"Edwin Peñalo",                  role:"Data Engineering",   exp:5,  edu:"Grado",                                                       english:"Regular",   status:"Activo",     bankExp:"No", skills:{python:4,sql:5,bi:3,excel:4,r:3}, benchmark:"Data Engineering" },
  { id:15, name:"Johanca María Santos González", role:"Data Analysis / BI", exp:3,  edu:"Tecnico Superior",                                            english:"Bien",      status:"Disponible", bankExp:"Sí", skills:{python:2,sql:4,bi:5,excel:5,r:2}, benchmark:"Data Analysis / BI" },
  { id:16, name:"Emmanuel Henriquez Rosario",    role:"Seguridad TI",       exp:14, edu:"Grado",                                                       english:"Excelente", status:"Disponible", bankExp:"Sí", skills:{python:2,sql:3,bi:2,excel:4,r:1}, benchmark:"Seguridad TI" },
  { id:17, name:"Tomas De Jesus Mayol Valdez",   role:"Data Engineering",   exp:8,  edu:"Maestria",                                                    english:"Regular",   status:"Activo",     bankExp:"No", skills:{python:4,sql:5,bi:3,excel:3,r:3}, benchmark:"Data Engineering" },
  { id:18, name:"Roberto Armando Castillo",      role:"Project Management", exp:11, edu:"Maestria",                                                    english:"Excelente", status:"Activo",     bankExp:"Sí", skills:{python:1,sql:3,bi:4,excel:5,r:2}, benchmark:"Project Management" },
  { id:19, name:"Mirianny De La Cruz Ventura",   role:"Data Analysis / BI", exp:2,  edu:"Grado",                                                       english:"Bien",      status:"Disponible", bankExp:"No", skills:{python:2,sql:4,bi:4,excel:4,r:2}, benchmark:"Data Analysis / BI" }
];

let selectedRole = 'All';

function getSkillLabel(val) {
  if (val >= 5) return 'Experto';
  if (val >= 4) return 'Avanzado';
  if (val >= 3) return 'Intermedio';
  return 'Básico';
}

function initials(name) {
  return name.split(' ').map(n => n[0]).join('').substring(0,2);
}

function render() {
  const filtered = selectedRole === 'All' ? candidates : candidates.filter(c => c.benchmark === selectedRole);

  const benchmarkCols = Object.entries(salaryBenchmarks).map(([pos, val]) => `
    <div class="p-4 ${selectedRole === pos ? 'bg-blue-50' : ''}">
      <p class="text-[10px] text-slate-400 uppercase font-black mb-1 leading-tight">${pos}</p>
      <p class="text-sm font-bold text-slate-700">${val.min/1000}k - ${val.max/1000}k</p>
    </div>
  `).join('');

  const roleButtons = Object.keys(salaryBenchmarks).map(role => `
    <button onclick="setRole('${role}')"
      class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-bold transition-all ${selectedRole === role ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'hover:bg-slate-100 text-slate-600'}">
      ${role}
    </button>
  `).join('');

  const cards = filtered.map(c => {
    const bm = salaryBenchmarks[c.benchmark];
    const skillBars = Object.entries(c.skills).map(([skill, val]) => `
      <div class="flex flex-col">
        <span class="text-[9px] uppercase text-slate-400 font-black tracking-tighter mb-1">${skill}</span>
        <div class="flex gap-0.5 mb-1">
          ${[1,2,3,4,5].map(i => `<div class="h-1.5 w-full rounded-full ${i <= val ? 'bg-blue-600' : 'bg-slate-200'}"></div>`).join('')}
        </div>
        <span class="text-[9px] font-bold text-slate-500 text-right">${getSkillLabel(val)}</span>
      </div>
    `).join('');

    return `
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 hover:border-blue-400 transition-all overflow-hidden group">
      <div class="p-6">
        <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-6">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-slate-50 group-hover:bg-blue-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:text-blue-600 font-black text-xl border border-slate-100 transition-colors">
              ${initials(c.name)}
            </div>
            <div>
              <h3 class="text-xl font-bold text-slate-800">${c.name}</h3>
              <div class="flex flex-wrap items-center gap-3 mt-1">
                <span class="text-[10px] px-2.5 py-1 rounded-lg font-black uppercase ${bm.color}">${c.role}</span>
                <span class="text-slate-400 text-xs font-bold flex items-center gap-1">
                  <svg class="w-3.5 h-3.5 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2-2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                  ${c.exp} años exp.
                </span>
                ${c.bankExp === 'Sí' ? `<span class="bg-blue-600 text-white text-[9px] px-2 py-1 rounded-lg font-black">🏦 BANCA</span>` : ''}
              </div>
            </div>
          </div>
          <div class="w-full md:w-auto bg-slate-50 rounded-2xl p-4 border border-slate-100">
            <p class="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-tighter text-center">Benchmark Mercado</p>
            <p class="text-xl font-black text-slate-700 text-center">RD$ ${bm.min/1000}k - ${bm.max/1000}k</p>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
          <div class="space-y-3">
            <div class="flex items-start gap-3">
              <svg class="w-4 h-4 text-blue-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/></svg>
              <div>
                <span class="text-[10px] text-slate-400 font-bold uppercase block">Último Estudio</span>
                <span class="text-xs text-slate-700 font-medium italic">"${c.edu}"</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              <div>
                <span class="text-[10px] text-slate-400 font-bold uppercase block">Inglés</span>
                <span class="text-xs text-slate-700 font-bold uppercase">${c.english}</span>
              </div>
            </div>
          </div>
          <div class="md:col-span-2 bg-slate-50/70 rounded-2xl p-4 border border-slate-100">
            <div class="grid grid-cols-5 gap-4">${skillBars}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="max-w-7xl mx-auto">
      <!-- Header -->
      <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
        <div>
          <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Análisis de Selección IT</h1>
          <p class="text-slate-500 mt-1 uppercase text-xs font-bold tracking-widest">Consolidado de Talentos por Perfil de Mercado</p>
        </div>
        <div class="bg-white px-5 py-2.5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-2">
          <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          <span class="font-bold text-slate-700">${candidates.length} Postulantes</span>
        </div>
      </header>

      <!-- Benchmark -->
      <section class="mb-10 overflow-x-auto pb-4">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-w-[900px] lg:min-w-full">
          <div class="bg-slate-800 p-4 flex items-center gap-2 text-white">
            <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
            <h2 class="font-semibold text-sm">Benchmark Salarial Mensual Sugerido (DOP)</h2>
          </div>
          <div class="grid grid-cols-7 divide-x divide-slate-100">${benchmarkCols}</div>
        </div>
      </section>

      <!-- Main -->
      <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <aside class="lg:col-span-1">
          <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-8">
            <h3 class="text-xs font-black text-slate-400 uppercase mb-4 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
              Filtrar Posición
            </h3>
            <div class="space-y-1">
              <button onclick="setRole('All')"
                class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-bold transition-all ${selectedRole === 'All' ? 'bg-blue-600 text-white shadow-lg shadow-blue-200' : 'hover:bg-slate-100 text-slate-600'}">
                Todos los Candidatos
              </button>
              ${roleButtons}
            </div>
          </div>
        </aside>
        <main class="lg:col-span-3 space-y-4">${cards}</main>
      </div>

      <!-- Recommendations -->
      <section class="mt-16 mb-10">
        <div class="bg-white rounded-[2rem] p-8 md:p-12 border border-slate-200 shadow-xl shadow-slate-200/50">
          <div class="flex items-center gap-3 mb-8">
            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg>
            <h2 class="text-3xl font-black text-slate-800">Recomendaciones Estratégicas</h2>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="bg-blue-50/50 rounded-3xl p-6 border border-blue-100">
              <div class="flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                <h3 class="font-black text-blue-900 uppercase text-sm tracking-widest">Top Élite Técnica</h3>
              </div>
              <ul class="space-y-4">
                <li class="text-sm"><strong class="text-blue-800 block">Daniel Cabrera (Ing. Datos)</strong>Nivel experto (5/5) en SQL, BI y Excel. El perfil técnico más fuerte de toda la base.</li>
                <li class="text-sm"><strong class="text-blue-800 block">Tomas De Jesus (Ing. Datos)</strong>Maestría con alto dominio de Python y SQL. Ideal para pipelines complejos.</li>
              </ul>
            </div>
            <div class="bg-emerald-50/50 rounded-3xl p-6 border border-emerald-100">
              <div class="flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-2 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>
                <h3 class="font-black text-emerald-900 uppercase text-sm tracking-widest">Especialistas Bancarios</h3>
              </div>
              <ul class="space-y-4">
                <li class="text-sm"><strong class="text-emerald-800 block">Yelsin Joel (Data Analyst)</strong>Combo de Oro: Maestría en Ciencia de Datos, experto técnico y experiencia en banca dominicana.</li>
                <li class="text-sm"><strong class="text-emerald-800 block">Yanilka Garcia (PM)</strong>Sólida trayectoria bancaria con 29 años de experiencia y certificación Scrum Master.</li>
              </ul>
            </div>
            <div class="bg-purple-50/50 rounded-3xl p-6 border border-purple-100">
              <div class="flex items-center gap-2 mb-4">
                <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <h3 class="font-black text-purple-900 uppercase text-sm tracking-widest">Oportunidades Inmediatas</h3>
              </div>
              <ul class="space-y-4">
                <li class="text-sm"><strong class="text-purple-800 block">Ran Shemer Ramirez (Arquitectura)</strong>12 años de exp., inglés excelente y disponibilidad inmediata. Valor competitivo en benchmark.</li>
                <li class="text-sm"><strong class="text-purple-800 block">Emmanuel Henriquez (Seguridad)</strong>Perfil senior (14 años) especializado en seguridad con disponibilidad remota inmediata.</li>
              </ul>
            </div>
          </div>
        </div>
      </section>

      <footer class="text-center text-xs text-slate-400 pb-6">Reporte Ejecutivo · Confidencial</footer>
    </div>
  `;
}

function setRole(role) {
  selectedRole = role;
  render();
}

render();
</script>
</body>
</html>
