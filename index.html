// ── State ────────────────────────────────────────────────────────────────────
let activeTab = 'base';
let selectedRole = 'All';

// ── Helpers ──────────────────────────────────────────────────────────────────
function skillLabel(v){ return v>=5?'Experto':v>=4?'Avanzado':v>=3?'Intermedio':'Básico'; }
function inits(n){ return n.split(' ').map(x=>x[0]).join('').substring(0,2); }
function fmt(n){ return (n/1000)+'k'; }
function getBM(){ return activeTab==='plus'?plusBM:baseBM; }

// ── Render benchmark bar ──────────────────────────────────────────────────────
function renderBMBar(bm){
  if(activeTab==='nosal') return '';
  const isPlus = activeTab==='plus';
  const cols = Object.entries(bm).map(([pos,v])=>`
    <div class="p-4 ${selectedRole===pos?'bg-blue-50':''}">
      <p class="text-[10px] text-slate-400 uppercase font-black mb-1 leading-tight">${pos}</p>
      <p class="text-sm font-bold ${isPlus?'text-emerald-700':'text-slate-700'}">${fmt(v.min)} - ${fmt(v.max)}</p>
      ${isPlus?'<p class="text-[9px] text-emerald-500 font-bold">+50K vs base</p>':''}
    </div>`).join('');
  return `<section class="mb-10 overflow-x-auto pb-4">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-w-[900px] lg:min-w-full">
      <div class="bg-slate-800 p-4 flex items-center gap-2 text-white">
        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        <h2 class="font-semibold text-sm">${isPlus?'Benchmark Salarial +50K (DOP)':'Benchmark Salarial Mensual Sugerido (DOP)'}</h2>
        ${isPlus?'<span class="ml-2 bg-emerald-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">+RD$50,000</span>':''}
      </div>
      <div class="grid grid-cols-7 divide-x divide-slate-100">${cols}</div>
    </div>
  </section>`;
}

// ── Render soft skills block ──────────────────────────────────────────────────
function renderSoft(c){
  const softDefs = [
    { key:'equipo',       label:'Trabajo en Equipo' },
    { key:'comunicacion', label:'Comunicación' },
    { key:'adaptacion',   label:'Adaptación' },
    { key:'resolucion',   label:'Resolución' },
    { key:'estres',       label:'Manejo de Estrés' },
    { key:'presion',      label:'Alta Presión' }
  ];
  const bars = softDefs.map(d=>{
    const v = c.soft[d.key]||2;
    const pct = (v/4)*100;
    return `
    <div class="flex flex-col">
      <span class="text-[9px] uppercase text-slate-400 font-black tracking-tighter mb-1">${d.label}</span>
      <div class="w-full bg-slate-200 rounded-full" style="height:5px">
        <div class="${softColor(v)} rounded-full" style="height:5px;width:${pct}%"></div>
      </div>
      <span class="text-[9px] font-bold text-slate-500 text-right mt-0.5">${softLabel(v)}</span>
    </div>`;
  }).join('');

  return `
  <div class="bg-rose-50/40 rounded-2xl p-4 border border-rose-100 mt-4">
    <p class="text-[10px] text-rose-400 font-black uppercase tracking-wider mb-3">Habilidades Blandas</p>
    <div class="grid grid-cols-3 md:grid-cols-6 gap-3">${bars}</div>
    ${c.softNotes?`
    <div class="mt-3 grid grid-cols-1 md:grid-cols-3 gap-2">
      <div class="text-[10px] text-slate-500"><span class="font-bold text-slate-700">Resolucion:</span> ${c.softNotes.resolucion||'-'}</div>
      <div class="text-[10px] text-slate-500"><span class="font-bold text-slate-700">Bajo presión:</span> ${c.softNotes.presion||'-'}</div>
      <div class="text-[10px] text-slate-500"><span class="font-bold text-slate-700">Actitud:</span> ${c.softNotes.actitud||'-'}</div>
    </div>`:''}
  </div>`;
}

// ── Render cards ──────────────────────────────────────────────────────────────
function renderCards(bm, showSal){
  const list = selectedRole==='All'?candidates:candidates.filter(c=>c.benchmark===selectedRole);
  return list.map(c=>{
    const b = bm[c.benchmark];
    const isPlus = activeTab==='plus';
    const techBars = Object.entries(c.skills).map(([sk,v])=>`
      <div class="flex flex-col">
        <span class="text-[9px] uppercase text-slate-400 font-black tracking-tighter mb-1">${sk}</span>
        <div class="flex gap-0.5 mb-1">${[1,2,3,4,5].map(i=>`<div class="h-1.5 w-full rounded-full ${i<=v?'bg-blue-600':'bg-slate-200'}"></div>`).join('')}</div>
        <span class="text-[9px] font-bold text-slate-500 text-right">${skillLabel(v)}</span>
      </div>`).join('');

    const salBlock = showSal?`
      <div class="w-full md:w-auto bg-slate-50 rounded-2xl p-4 border border-slate-100 text-center">
        <p class="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-tighter">Benchmark Mercado</p>
        <p class="text-xl font-black ${isPlus?'text-emerald-700':'text-slate-700'}">RD$ ${fmt(b.min)} - ${fmt(b.max)}</p>
        ${isPlus?'<p class="text-[9px] text-emerald-500 font-bold">+50K aplicado</p>':''}
      </div>`:'';

    return `
    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 hover:border-blue-400 transition-all overflow-hidden group">
      <div class="p-6">
        <!-- Header row -->
        <div class="flex flex-col md:flex-row justify-between items-start gap-4 mb-4">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-slate-50 group-hover:bg-blue-50 rounded-2xl flex items-center justify-center text-slate-400 group-hover:text-blue-600 font-black text-xl border border-slate-100 transition-colors">${inits(c.name)}</div>
            <div>
              <h3 class="text-xl font-bold text-slate-800">${c.name}</h3>
              <div class="flex flex-wrap items-center gap-3 mt-1">
                <span class="text-[10px] px-2.5 py-1 rounded-lg font-black uppercase ${b.color}">${c.role}</span>
                <span class="text-slate-400 text-xs font-bold">&#128193; ${expLabel(c.exp)}</span>
                ${c.bankExp==='Sí'?'<span class="bg-blue-600 text-white text-[9px] px-2 py-1 rounded-lg font-black">&#127974; BANCA</span>':''}
              </div>
            </div>
          </div>
          ${salBlock}
        </div>

        <!-- Tech skills + info -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
          <div class="space-y-3">
            <div class="flex items-start gap-3">
              <svg class="w-4 h-4 text-blue-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/></svg>
              <div>
                <span class="text-[10px] text-slate-400 font-bold uppercase block">Último Estudio</span>
                <span class="text-xs text-slate-700 font-medium italic">"${c.edu}"</span>
              </div>
            </div>
            <div class="flex items-center gap-3">
              <svg class="w-4 h-4 text-blue-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              <div>
                <span class="text-[10px] text-slate-400 font-bold uppercase block">Inglés</span>
                <span class="text-xs text-slate-700 font-bold uppercase">${c.english}</span>
              </div>
            </div>
          </div>
          <div class="md:col-span-2 bg-slate-50/70 rounded-2xl p-4 border border-slate-100">
            <p class="text-[10px] text-slate-400 font-black uppercase tracking-wider mb-3">Habilidades Técnicas</p>
            <div class="grid grid-cols-5 gap-4">${techBars}</div>
          </div>
        </div>

        <!-- Soft skills -->
        ${renderSoft(c)}
      </div>
    </div>`;
  }).join('');
}

// ── Render sidebar ────────────────────────────────────────────────────────────
function renderSidebar(bm){
  const btns = Object.keys(bm).map(r=>`
    <button onclick="setRole('${r}')" class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-bold transition-all ${selectedRole===r?'bg-blue-600 text-white shadow-lg shadow-blue-200':'hover:bg-slate-100 text-slate-600'}">${r}</button>`).join('');
  return `<aside class="lg:col-span-1">
    <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 sticky top-8">
      <h3 class="text-xs font-black text-slate-400 uppercase mb-4">Filtrar Posición</h3>
      <div class="space-y-1">
        <button onclick="setRole('All')" class="w-full text-left px-4 py-2.5 rounded-xl text-sm font-bold transition-all ${selectedRole==='All'?'bg-blue-600 text-white shadow-lg shadow-blue-200':'hover:bg-slate-100 text-slate-600'}">Todos los Candidatos</button>
        ${btns}
      </div>
    </div>
  </aside>`;
}
